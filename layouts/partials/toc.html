{{ if and .Params.toc .TableOfContents }}
{{ .Scratch.Set "needsToc" true }}
<nav class="toc" aria-label="Table of contents">
  {{ .TableOfContents }}
  <svg class="toc-marker" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
    <path stroke="currentColor" stroke-width="3" fill="transparent" stroke-dasharray="0, 0, 0, 1000" stroke-linecap="round" stroke-linejoin="round" transform="translate(-0.5, -0.5)" />
  </svg>
</nav>
{{ end }}
