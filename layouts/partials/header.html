<header class="site-header">
  <div class="container">
    <div class="site-title">
      <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    </div>
    <div class="header-right">
      {{ if .Site.Menus.main }}
      <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
      <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
        <svg class="nav-icon-open" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg class="nav-icon-close" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
      </label>
      <nav aria-label="Main navigation">
        <ul class="site-nav">
          {{ range .Site.Menus.main }}
          <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}{{ if $.HasMenuCurrent "main" . }} aria-current="true"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
      {{ end }}
      {{ if hugo.IsServer }}
      <button class="theme-toggle" aria-label="Toggle color scheme" title="Toggle color scheme">
        <span class="theme-toggle-dark">☀︎</span>
        <span class="theme-toggle-light">☾</span>
      </button>
      {{ end }}
    </div>
  </div>
</header>
